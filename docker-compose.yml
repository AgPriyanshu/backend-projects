services:
  web:
    build: .
    container_name: django_app
    command: uvicorn backend_projects.asgi:application --host 0.0.0.0 --port 8000
      --ws wsproto --reload
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    volumes:
      - .:/app
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: ./.env

  worker:
    build: .
    container_name: celery_worker
    profiles: [ web-gis ]
    command: celery -A backend_projects worker -l info
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    volumes:
      - .:/app
    entrypoint: ""
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    env_file: ./.env

  db:
    platform: linux/amd64
    image: postgis/postgis:17-3.6-alpine
    container_name: postgres_postgis_db
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:latest
    container_name: redis_cache
    command: >
      redis-server --loglevel warning --slowlog-log-slower-than -1
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs
    profiles: [ web-gis ]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        mkdir -p /etc/seaweedfs/s3-config
        cat <<EOF >/etc/seaweedfs/s3-config/config.json
        {
          "identities": [
            {
              "name": "backend-app",
              "credentials": [
                {
                  "accessKey": "${S3_ACCESS_KEY}",
                  "secretKey": "${S3_SECRET_KEY}"
                }
              ],
              "actions": ["Admin", "Read", "Write"]
            }
          ]
        }
        EOF
        exec weed server \
          -s3 \
          -s3.port=8333 \
          -s3.config=/etc/seaweedfs/s3-config/config.json \
          -dir=/data \
          -volume.max=0
    ports:
      - "9333:9333" # Master server
      - "8080:8080" # Volume server (filer)
      - "8333:8333" # S3 API
    volumes:
      - ./data/seaweedfs:/data
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-seaweedfsadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-seaweedfsadmin123}
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9333/cluster/status" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
