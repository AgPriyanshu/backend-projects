appName: backend-app

image:
  repository: ghcr.io/agpriyanshu/backend-projects
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

serviceAccount:
  create: false
  name: ghcr-sa

resources:
  requests:
    cpu: 4000m
    memory: 4000Mi
  limits:
    cpu: 4000m
    memory: 8000Mi

nodeSelector:
  kubernetes.io/arch: amd64

# HPA
minReplicas: 1
maxReplicas: 10
averageUtilization: 50

# Environment variables
env:
  - name: ENV
    value: "production"
  - name: DEBUG
    value: "0"
  # Database
  - name: DB_HOST
    value: "postgres"
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: "postgres"
  - name: DB_USER
    value: "postgres"
  - name: DB_PASSWORD
    value: "postgres"
  # Cache
  - name: REDIS_HOST
    value: "redis"
  - name: REDIS_PORT
    value: "6379"
  # SeaweedFS S3 Configuration
  - name: S3_ENDPOINT
    value: "http://seaweedfs-s3:8333"
  - name: S3_PUBLIC_ENDPOINT
    value: "https://s3.worldofapps.bar"
  - name: S3_REGION
    value: "ap-south-1"
  - name: S3_BUCKET
    value: "woa"
  - name: S3_ACCESS_KEY
    value: "EEQb7fnFvvDsoHdr3qZh"
  - name: S3_SECRET_KEY
    value: "PpuxU5kwQkt6mkqrde3k"
