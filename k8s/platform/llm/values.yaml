# Default values for platform-llm.
# vllmResources and vllmPersistence are overridden at deploy time by values-computed.yaml.

model:
  name: "Qwen/Qwen2.5-7B-Instruct-AWQ"
  quantization: "awq"
  maxModelLen: 8192
  gpuMemoryUtilization: "0.90"
  # Set to your HuggingFace token if the model is gated.
  hfToken: ""

image:
  repository: vllm/vllm-openai
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8000

vllmResources:
  requests:
    "nvidia.com/gpu": "1"
    cpu: "2000m"
    memory: "4Gi"
  limits:
    "nvidia.com/gpu": "1"
    cpu: "4000m"
    memory: "8Gi"

vllmPersistence:
  size: "30Gi"
