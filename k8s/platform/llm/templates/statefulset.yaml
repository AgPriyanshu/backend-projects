apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm
  namespace: default
spec:
  selector:
    matchLabels:
      app: vllm
  serviceName: "vllm"
  replicas: 1
  template:
    metadata:
      labels:
        app: vllm
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: vllm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--model"
            - "{{ .Values.model.name }}"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--quantization"
            - "{{ .Values.model.quantization }}"
            - "--max-model-len"
            - "{{ .Values.model.maxModelLen }}"
            - "--gpu-memory-utilization"
            - "{{ .Values.model.gpuMemoryUtilization }}"
          {{- if .Values.model.hfToken }}
          env:
            - name: HF_TOKEN
              value: {{ .Values.model.hfToken | quote }}
          {{- end }}
          ports:
            - containerPort: 8000
              name: http
          resources:
            {{- toYaml .Values.vllmResources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
  volumeClaimTemplates:
    - metadata:
        name: hf-cache
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.vllmPersistence.size }}
        storageClassName: standard
