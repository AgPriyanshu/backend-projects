apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: default
spec:
  selector:
    matchLabels:
      app: postgres
  serviceName: "postgres"
  replicas: 1
  template:
    metadata:
      labels:
        app: postgres
    spec:
      terminationGracePeriodSeconds: 10
      # Security context at pod level for fsGroup
      securityContext:
        fsGroup: 70
      # Init container to fix permissions
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/postgresql/data/pgdata
              chown -R 70:70 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data/pgdata
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgis/postgis:17-3.6-alpine
          args:
            - "-c"
            - "shared_buffers={{ .Values.postgresConfig.sharedBuffers }}"
            - "-c"
            - "work_mem={{ .Values.postgresConfig.workMem }}"
            - "-c"
            - "maintenance_work_mem={{ .Values.postgresConfig.maintenanceWorkMem }}"
            - "-c"
            - "effective_cache_size={{ .Values.postgresConfig.effectiveCacheSize }}"
            - "-c"
            - "max_connections={{ .Values.postgresConfig.maxConnections }}"
            - "-c"
            - "shared_preload_libraries=pg_stat_statements"
          securityContext:
            runAsUser: 70
            runAsGroup: 70
          env:
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources: {{- toYaml .Values.postgresResources | nindent 12 }}
          ports:
            - containerPort: 5432
              name: postgres
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgresPersistence.size }}
        storageClassName: standard
